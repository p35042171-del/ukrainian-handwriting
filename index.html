<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přepis rukopisu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Přepis rukopisu do Wordu</h1>

<div class="upload-wrapper">

    

    <label for="image" class="upload-box">

        <div class="upload-icon">
            📄
        </div>

        <div class="upload-title">
            Vyberte fotografii rukopisu
        </div>

        <div class="upload-subtitle">
            JPG, PNG, HEIC
        </div>

    </label>

</div>

<img
    id="preview"
    alt="Náhled obrázku"
>

<div class="actions">

    <button id="scanBtn">
        ✨ Rozpoznat text
    </button>

    <button id="learnBtn">
        🧠 Uložit opravy
    </button>

    <button id="downloadBtn">
        📄 Stáhnout Word
    </button>

</div>

<textarea
    id="output"
    placeholder="Rozpoznaný text se zobrazí zde..."
></textarea>

</div>


<script src="app.js"></script>

</body>
</html>
