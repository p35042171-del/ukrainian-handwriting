<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přepis rukopisu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Перепис рукопису</h1>

   <label for="image" class="upload-box">
    <div class="upload-title">
        Виберіть зображення
    </div>
    <div class="upload-subtitle">
        Натисніть або перетягніть зображення сюди
    </div>
</label>

<input
    type="file"
    id="image"
    accept="image/*"
    hidden
>

    <img id="preview">

    <button id="scanBtn">
        розпізнати текст
    </button>

    <textarea id="output"></textarea>

<button id="learnBtn">
    запам'ятати текст
</button>

    <button id="downloadBtn">
        завантажити як Word
    </button>


<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>  
<script src="app.js"></script>

</body>
</html>
