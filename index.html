<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přepis rukopisu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Переписування рукопису до Word</h1>

<div class="upload-wrapper">

    <label for="image" class="upload-box">

        <div class="upload-icon">
            📄
        </div>

        <div class="upload-title">
            Виберіть фото рукопису
        </div>

        <div class="upload-subtitle">
            JPG, PNG, HEIC
        </div>
    </label>

            <div class="actions">
                        <button id="scanBtn">
        ✨ Розпізнати текст
    </button>
        </div>

<input
    type="file"
    id="image"
    accept="image/*"
    hidden
>

</div>

<img id="preview" style="display:none;">
    
<textarea
    id="output"
    placeholder="Розпізнаний текст буде зображений тут..."
></textarea>

        <div class="actions">


    <button id="learnBtn">
        🧠 Зберегти виправлення 
    </button>

    <button id="downloadBtn">
        📄 Зберегти Word
    </button>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
