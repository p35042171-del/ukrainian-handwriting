<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přepis rukopisu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Přepis rukopisu do Wordu</h1>

    <input type="file" id="image" accept="image/*">

    <img id="preview">

    <button id="scanBtn">
        Rozpoznat text
    </button>

    <textarea id="output"></textarea>

<button id="learnBtn">
    Uložit opravy
</button>

    <button id="downloadBtn">
        Stáhnout Word
    </button>

</div>


<script src="app.js"></script>

</body>
</html>
