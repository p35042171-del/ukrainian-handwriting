<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Přepis rukopisu</title>

<link rel="stylesheet" href="style.css">

<script src="app.js" defer></script>

</head>
<body>

<div class="container">

    <h1>Přepis rukopisu do Wordu</h1>

    <div class="upload-section">

        <label for="image" class="upload-box">

            <div class="upload-icon">📄</div>

            <div class="upload-title">
                Vyberte fotografii rukopisu
            </div>

            <div class="upload-subtitle">
                JPG, PNG, JPEG, HEIC
            </div>

        </label>

        <input
            type="file"
            id="image"
            accept="image/*"
            hidden
        >

    </div>

    <img
        id="preview"
        style="display:none;"
    >

    <button id="scanBtn">
        Rozpoznat text
    </button>

    <textarea
        id="output"
        placeholder="Rozpoznaný text se zobrazí zde..."
    ></textarea>

    <div class="buttons">

        <button id="learnBtn">
            Uložit opravy
        </button>

        <button id="downloadBtn">
            Stáhnout Word
        </button>

    </div>

</div>

</body>
</html>
