<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Перепис рукопису
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>
<body>

<div class="container">

    <div class="hero">

        <h1>
            📝 Перепис рукопису
        </h1>

        <p class="subtitle">
            Завантажте фотографію рукописного тексту
        </p>

    </div>

    <label
        for="image"
        class="upload-box"
    >

        <div class="upload-icon">
            📷
        </div>

        <div class="upload-title">
            Вибрати фотографію
        </div>

        <div class="upload-subtitle">
            Натисніть або перетягніть зображення
        </div>

    </label>

    <input
        type="file"
        id="image"
        accept="image/*"
        hidden
    >

    <img
        id="preview"
        alt="Preview"
    >

    <textarea
        id="output"
        placeholder="Тут з'явиться розпізнаний текст..."
    ></textarea>

    <div class="buttons">

        <button id="scanBtn">
            ✨ Розпізнати текст
        </button>

        <button id="learnBtn">
            🧠 Зберегти виправлення
        </button>

        <button id="downloadBtn">
            📄 Завантажити Word
        </button>

    </div>

</div>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="app.js"></script>

</body>
</html>
